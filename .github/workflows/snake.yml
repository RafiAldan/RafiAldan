name: Generate Snake & Pacman Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Generate Snake (mode default)
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: RafiAldan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Generate Pacman (mode pacman — job terpisah agar file tidak tertimpa)
      - name: Generate Pacman SVG
        uses: Platane/snk@v3
        with:
          github_user_name: RafiAldan
          outputs: |
            dist/pacman.svg?type=pacman
            dist/pacman-dark.svg?type=pacman&palette=github-dark

      # Push semua ke branch output
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
